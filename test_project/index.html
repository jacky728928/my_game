<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>游戏主页</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- 背景层 -->
<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-particles" id="particles"></div>
</div>

<!-- 主容器 -->
<div id="app">
  <!-- 页面内容区域 -->
  <div id="page-container">
    <!-- 冒险页面（默认显示） -->
    <div id="page-adventure" class="page active">
      <div class="portrait-frame">
        <div class="portrait-glow"></div>
        <div class="portrait-inner">
          <img class="portrait-img" src="" alt="立绘">
        </div>
        <div class="portrait-corner tl"></div>
        <div class="portrait-corner tr"></div>
        <div class="portrait-corner bl"></div>
        <div class="portrait-corner br"></div>
      </div>
      <div class="page-title">冒险</div>
      <button class="portrait-switch" id="portraitSwitch">↻ 切换立绘</button>
    </div>
    
    <!-- 主角页面 -->
    <div id="page-hero" class="page">
      <div class="dev-frame">
        <div class="dev-inner">
          <div class="dev-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
            </svg>
          </div>
          <div class="dev-text">开发中</div>
          <div class="dev-sub">敬请期待</div>
        </div>
      </div>
      <div class="page-title">主角</div>
    </div>
    
    <!-- 科技树页面 -->
    <div id="page-tech" class="page">
      <div class="dev-frame">
        <div class="dev-inner">
          <div class="dev-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2L8 6h3v6H8l4 4 4-4h-3V6h3L12 2z"/>
              <path d="M5 16l-2 4h4l-2 4"/>
              <path d="M19 16l2 4h-4l2 4"/>
            </svg>
          </div>
          <div class="dev-text">开发中</div>
          <div class="dev-sub">敬请期待</div>
        </div>
      </div>
      <div class="page-title">科技树</div>
    </div>
    
    <!-- 商店页面 -->
    <div id="page-shop" class="page">
      <div class="dev-frame">
        <div class="dev-inner">
          <div class="dev-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 9h18v10a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
              <path d="M3 9l2-6h14l2 6"/>
              <path d="M12 14v4"/>
            </svg>
          </div>
          <div class="dev-text">开发中</div>
          <div class="dev-sub">敬请期待</div>
        </div>
      </div>
      <div class="page-title">商店</div>
    </div>
  </div>
  
  <!-- 底部导航栏 -->
  <nav id="bottom-nav">
    <button class="nav-btn" data-page="hero">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
        </svg>
      </div>
      <span class="nav-label">主角</span>
      <div class="nav-indicator"></div>
    </button>
    <button class="nav-btn" data-page="tech">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L8 6h3v6H8l4 4 4-4h-3V6h3L12 2z"/>
          <path d="M5 16l-2 4h4l-2 4"/>
          <path d="M19 16l2 4h-4l2 4"/>
        </svg>
      </div>
      <span class="nav-label">科技树</span>
      <div class="nav-indicator"></div>
    </button>
    <button class="nav-btn active" data-page="adventure">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L9 9l-7 1 5 5-1 7 6-3 6 3-1-7 5-5-7-1-3-7z"/>
        </svg>
      </div>
      <span class="nav-label">冒险</span>
      <div class="nav-indicator"></div>
    </button>
    <button class="nav-btn" data-page="shop">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9h18v10a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
          <path d="M3 9l2-6h14l2 6"/>
          <path d="M12 14v4"/>
        </svg>
      </div>
      <span class="nav-label">商店</span>
      <div class="nav-indicator"></div>
    </button>
  </nav>
</div>

<script src="js/main.js"></script>
</body>
</html>
